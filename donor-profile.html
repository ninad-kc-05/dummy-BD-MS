<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeFlow – Donor Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="logo" onclick="goHome()">
      <img src="logo.svg" alt="LifeFlow" />
    </div>
    <div class="nav-links">
      <button onclick="goDonorDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <div class="container card-panel card-narrow">
    <h2 class="text-center">My Profile (Dummy)</h2>
    <p class="text-muted mt-sm text-center">Static fields just to demonstrate layout.</p>

    <label>Full Name</label>
    <input type="text" value="Rohan S." />

    <label>Blood Group</label>
    <input type="text" value="O+" />

    <label>Phone</label>
    <input type="text" value="+91-9876543210" />

    <label>City</label>
    <input type="text" value="Pune" />

    <button class="btn btn-primary" style="width:100%; margin-top:0.5rem;" onclick="fakeSave()">Save (Dummy)</button>
  </div>

  <div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
  </div>

  <script>
    function goHome() { window.location.href = "index.html"; }
    function goDonorDashboard() { window.location.href = "donor-dashboard.html"; }
    function fakeSave() { alert("Profile save is dummy in this prototype."); }
  </script>
</body>
</html>
