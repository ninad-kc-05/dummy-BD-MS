<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlow – Register</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="logo" onclick="goHome()">
        <img src="logo.svg">
    </div>

    <div class="nav-links">
        <button onclick="goHome()">Home</button>
        <button onclick="goLogin()">Login</button>
    </div>
</div>

<!-- Register Form -->
<div class="container card-panel card-narrow">
    <h2 class="text-center">Create Account</h2>

    <label>Name</label>
    <input type="text" placeholder="Full Name">

    <label>Email</label>
    <input type="email" placeholder="Email">

    <label>Password</label>
    <input type="password" placeholder="Password">

    <label>Select Role</label>
    <select id="role" onchange="toggleFields()">
        <option value="">-- Select --</option>
        <option value="donor">Donor</option>
        <option value="receiver">Hospital / Receiver</option>
        <option value="admin">Admin</option>
    </select>

    <!-- Donor Field -->
    <div id="donorField" style="display:none;">
        <label>Blood Group</label>
        <input type="text" placeholder="A+, O-, etc.">
    </div>

    <!-- Receiver Field -->
    <div id="receiverField" style="display:none;">
        <label>Hospital Name</label>
        <input type="text" placeholder="Hospital / Blood Bank Name">
    </div>

    <button class="btn btn-primary" style="width:100%;" onclick="register()">Register</button>
</div>

<!-- Footer -->
<div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
</div>

<script>
function goHome() {
    window.location.href = "index.html";
}

function goLogin(role) {
    let url = "login.html";
    if (role) {
        url += "?role=" + encodeURIComponent(role);
    }
    window.location.href = url;
}

function toggleFields() {
    const role = document.getElementById("role").value;
    document.getElementById("donorField").style.display = role === "donor" ? "block" : "none";
    document.getElementById("receiverField").style.display = role === "receiver" ? "block" : "none";
}

function register() {
    const role = document.getElementById("role").value;

    if (!role) {
        alert("Please select a role");
        return;
    }

    localStorage.setItem("userRole", role);
    alert("Registration successful!");
    window.location.href = "login.html?role=" + encodeURIComponent(role);
}

// Preselect role based on ?role= in URL (e.g. register.html?role=donor)
(function preselectRoleOnRegister() {
    const params = new URLSearchParams(window.location.search);
    const roleFromUrl = params.get("role");
    if (!roleFromUrl) return;

    const select = document.getElementById("role");
    if (!select) return;

    const values = Array.from(select.options).map(o => o.value);
    if (values.includes(roleFromUrl)) {
        select.value = roleFromUrl;
        toggleFields();
    }
})();
</script>

</body>
</html>
